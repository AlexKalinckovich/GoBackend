version: "2"
sql:
  - engine: "mysql"
    queries: "sql/queries"
    schema: "sql/schema"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_interface: true
        emit_empty_slices: true
        emit_exact_table_names: false
        emit_json_tags: true
        json_tags_case_style: "snake"
        emit_db_tags: true
        emit_prepared_queries: false
        sql_package: "database/sql"